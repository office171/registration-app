<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בדיקת חתימה - F1</title>
  <style>
    body {
      margin: 0;
      background: #eef2f7;
      color: #172033;
      font-family: Arial, sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(860px, calc(100% - 28px));
      margin: 28px auto;
      background: #fff;
      border: 1px solid #dce3ed;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.1);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    input {
      min-height: 42px;
      border: 1px solid #b9c5d3;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
    }

    .signature {
      margin-top: 18px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 190px;
      border: 1px solid #9aa8b8;
      border-radius: 6px;
      background: #fff;
      touch-action: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
      font: inherit;
    }

    .primary {
      background: #1f6f52;
      color: #fff;
    }

    .secondary {
      background: #e8edf3;
      color: #172033;
    }

    .status {
      margin-top: 16px;
      min-height: 24px;
      font-weight: 700;
      white-space: pre-wrap;
    }

    .hint {
      color: #5b6778;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>בדיקת חתימה על כללי ויזת F-1</h1>

    <div class="grid">
      <label>
        שם פרטי בעברית
        <input id="firstHe" value="ישראל" />
      </label>
      <label>
        שם משפחה בעברית
        <input id="lastHe" value="ישראלי" />
      </label>
      <label>
        שם פרטי באנגלית
        <input id="firstEn" value="Yisroel" />
      </label>
      <label>
        שם משפחה באנגלית
        <input id="lastEn" value="Israeli" />
      </label>
    </div>

    <section class="signature">
      <label>
        חתימה לבדיקה
        <canvas id="signatureCanvas"></canvas>
      </label>
      <div class="hint">חתום בעכבר או באצבע. הבדיקה שולחת רק חתימת F-1 לסקריפט.</div>
    </section>

    <div class="actions">
      <button class="primary" id="sendBtn" type="button">שלח בדיקת חתימה</button>
      <button class="secondary" id="clearBtn" type="button">נקה חתימה</button>
    </div>

    <div class="status" id="status"></div>
  </main>

  <script>
    const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQq4llWMXWjr6KPRXgN87-JMBh0wjclY7oJZg44IJ8aFWmmjQFn8_3RsyXPTN7GM5Dtg/exec";
    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    let drawing = false;
    let hasSignature = false;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineWidth = 2.2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#111827";
    }

    function point(event) {
      const rect = canvas.getBoundingClientRect();
      const touch = event.touches?.[0] || event.changedTouches?.[0];
      const source = touch || event;
      return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
      };
    }

    function start(event) {
      event.preventDefault();
      drawing = true;
      hasSignature = true;
      const p = point(event);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function move(event) {
      if (!drawing) return;
      event.preventDefault();
      const p = point(event);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function end(event) {
      if (!drawing) return;
      event.preventDefault();
      drawing = false;
    }

    function clearSignature() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSignature = false;
      statusEl.textContent = "";
    }

    function signatureBase64() {
      return canvas.toDataURL("image/png").split(",")[1];
    }

    async function sendTest() {
      if (!hasSignature) {
        statusEl.textContent = "צריך לחתום לפני שליחה.";
        return;
      }

      const payload = {
        status: "test",
        kind: "f1_signature_test",
        student_first_name_he: document.getElementById("firstHe").value.trim(),
        student_last_name_he: document.getElementById("lastHe").value.trim(),
        student_first_name_en: document.getElementById("firstEn").value.trim(),
        student_last_name_en: document.getElementById("lastEn").value.trim(),
        student_group_year: 'קבוצה תשפ"ז',
        student_visa_needed: "כן",
        submitted_at: new Date().toISOString()
      };

      const files = [{
        field_id: "student_visa_signature",
        name: "student_visa_signature.png",
        type: "image/png",
        data: signatureBase64()
      }];

      statusEl.textContent = "שולח בדיקה...";
      document.getElementById("sendBtn").disabled = true;

      try {
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ payload, files })
        });
        const text = await response.text();
        let result;
        try {
          result = JSON.parse(text);
        } catch {
          result = { raw: text };
        }

        if (!response.ok || result.ok === false) {
          throw new Error(result.error || text || "השליחה נכשלה");
        }

        statusEl.textContent =
          "נשלח בהצלחה.\n" +
          `גרסת סקריפט: ${result.code_version || "לא התקבלה - כנראה Deploy ישן"}\n` +
          `מספר בדיקה/תלמיד: ${result.student_number || result.registration_id || ""}\n` +
          `תיקייה: ${result.folder_url || "נוצרה בדרייב"}\n` +
          `PDF F1: ${result.signature_document_urls?.visa || "בדוק בתיקייה"}`;
      } catch (error) {
        statusEl.textContent = "שגיאה בשליחת הבדיקה:\n" + (error.message || error);
      } finally {
        document.getElementById("sendBtn").disabled = false;
      }
    }

    window.addEventListener("resize", resizeCanvas);
    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    canvas.addEventListener("touchend", end, { passive: false });
    document.getElementById("clearBtn").addEventListener("click", clearSignature);
    document.getElementById("sendBtn").addEventListener("click", sendTest);
    resizeCanvas();
  </script>
</body>
</html>
