<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>הרשמה לקבוצה</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="registration-card">
        <header class="brand-panel">
          <div class="brand-logos" aria-label="סמלי המוסד">
            <img src="./01.png" alt="מכללת חנה" />
            <img src="./02-transparent.png" alt="Machon Chana" />
          </div>

          <div class="brand-copy">
            <h1>רישום לתלמידי התמימים – תשפ"ז</h1>
          </div>

          <nav id="stepList" class="steps" aria-label="שלבי הטופס"></nav>
        </header>

        <div class="form-panel">
        <div class="topbar">
          <div>
            <p id="progressText" class="progress-text"></p>
            <h2 id="stepTitle"></h2>
          </div>
          <button id="saveDraftTop" class="ghost" type="button">שמור טיוטה</button>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <form id="registrationForm" novalidate>
          <div id="formFields" class="fields"></div>

          <div id="formError" class="form-error" role="alert"></div>

          <div class="actions">
            <button id="prevBtn" class="secondary" type="button">חזור</button>
            <button id="nextBtn" class="primary" type="button">הבא</button>
            <button id="submitBtn" class="primary submit" type="submit">שלח הרשמה</button>
          </div>
        </form>
        </div>
      </section>
    </main>

    <template id="successTemplate">
      <div class="success">
        <h2>ההרשמה נשלחה בהצלחה</h2>
        <p>קיבלנו את הפרטים והקבצים. אישור קבלה נשלח לכתובת האימייל שהוזנה בטופס.</p>
        <button id="newFormBtn" class="primary" type="button">פתח טופס חדש</button>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
